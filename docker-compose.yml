services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=course_advisor
      - POSTGRES_USER=advisor
      - POSTGRES_PASSWORD=advisor_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - advisor-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - advisor-net

  backend:
    build: ./backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "2828:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://advisor:advisor_password@db:5432/course_advisor
      - REDIS_URL=redis://redis:6379
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
      - redis
    develop:
      watch: 
        - action: sync
          path: ./backend
          target: /app
    networks:
      - advisor-net

  arq-worker:
    build: ./backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uv run arq app.worker.Worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://advisor:advisor_password@db:5432/course_advisor
      - REDIS_URL=redis://redis:6379
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - PYTHONPATH=/app
    depends_on:
      - db
      - redis
    develop:
      watch: 
        - action: sync
          path: ./backend
          target: /app
    networks:
      - advisor-net

  frontend:
    build: ./frontend
    ports:
      - "2929:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:2828/api/v1
      - API_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
    networks:
      - advisor-net

networks:
  advisor-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
