services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=course_advisor
      - POSTGRES_USER=advisor
      - POSTGRES_PASSWORD=advisor_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - advisor-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - advisor-net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://advisor:advisor_password@db:5432/course_advisor
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    depends_on:
      - db
      - ollama
      - redis
    develop:
      watch: 
        - action: sync
          path: ./backend
          target: /app
    networks:
      - advisor-net

  rq-worker:
    build: ./backend
    command: rq worker --url redis://redis:6379
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://advisor:advisor_password@db:5432/course_advisor
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - PYTHONPATH=/app
    depends_on:
      - db
      - ollama
      - redis
    develop:
      watch: 
        - action: sync
          path: ./backend
          target: /app
    networks:
      - advisor-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - advisor-net

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
    networks:
      - advisor-net

  frontend-next:
    build: ./frontend-next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend-next
          target: /app
    networks:
      - advisor-net

networks:
  advisor-net:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  redis_data:
